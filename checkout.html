<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#EF7E1B">
<title>Checkout seguro · Zé na Porta</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23EF7E1B'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --amarelo:#EF7E1B;--laranja:#EE7C1A;--laranja-d:#C25E0B;--escuro:#1b1712;--texto:#241f19;--suave:#6f6457;--suave-2:#a99c8b;
    --linha:#f0e6d8;--linha-2:#e7dac6;--bg:#fbf3e8;--card:#fffdf9;--cream:#fbf3e8;--cream-2:#fdf6ec;--verde:#13a05c;--verde-2:#0e8f51;
    --vermelho:#e23b3b;--pix:#32BCAD;--sombra-sm:0 1px 3px rgba(80,45,10,.08);--sombra:0 8px 24px rgba(120,70,20,.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{max-width:100%;overflow-x:hidden}
  body{font-family:"Plus Jakarta Sans",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#fdf6ec 0%,#f6e8d4 100%);background-attachment:fixed;color:var(--texto);line-height:1.45;letter-spacing:-.011em;font-weight:500;-webkit-font-smoothing:antialiased;padding-bottom:30px}
  h1,h2,h3{letter-spacing:-.03em;font-weight:800}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  a{color:inherit;text-decoration:none}
  img{display:block}
  .shell{max-width:560px;margin:0 auto;background:var(--cream);min-height:100vh;box-shadow:0 0 60px rgba(120,70,20,.10)}

  /* APPBAR + RIBBON */
  .appbar{background:linear-gradient(125deg,#F58E22 0%,#EC7411 60%,#E26C0C 100%);padding:18px 18px 15px;color:#fff;box-shadow:0 6px 18px rgba(196,94,11,.22)}
  .appbar .row{display:flex;align-items:center;gap:10px}
  .appbar .logo{display:flex;align-items:center;gap:9px;font-weight:800;font-size:1.5rem;letter-spacing:-.02em}
  .appbar .logo img{width:38px;height:38px;border-radius:50%;border:2px solid rgba(255,255,255,.85)}
  .appbar .back{margin-left:auto;font-size:.84rem;font-weight:700;opacity:.95;display:inline-flex;align-items:center;gap:5px}
  .appbar .back svg{width:16px;height:16px;stroke:#fff;stroke-width:2.4;fill:none}
  .ribbon{background:#d9700f;color:#fff;text-align:center;font-size:.82rem;font-weight:700;padding:9px 16px;display:flex;align-items:center;justify-content:center;gap:7px}

  /* STEPS */
  .steps{padding:18px 18px 4px;display:flex;align-items:center;gap:6px;font-size:.8rem;font-weight:700;color:var(--suave-2)}
  .steps .st{display:flex;align-items:center;gap:7px}
  .steps .num{width:24px;height:24px;border-radius:50%;background:var(--linha-2);color:var(--suave);display:grid;place-items:center;font-size:.78rem;flex:0 0 auto}
  .steps .st.on .num{background:var(--amarelo);color:#fff}
  .steps .st.done .num{background:var(--verde);color:#fff}
  .steps .st.on{color:var(--escuro)} .steps .st.done{color:var(--verde-2)}
  .steps .num svg{width:13px;height:13px;stroke:#fff;stroke-width:3;fill:none}
  .steps .bar{flex:1;height:2px;background:var(--linha-2);border-radius:2px;min-width:8px}

  /* SUMMARY TOGGLE */
  .sumbar{padding:14px 18px 0}
  .sumtoggle{width:100%;background:var(--card);border:1px solid var(--linha-2);border-radius:13px;padding:14px 16px;display:flex;align-items:center;gap:11px;font-weight:700;font-size:.95rem;color:var(--escuro);box-shadow:var(--sombra-sm)}
  .sumtoggle .cic{color:var(--amarelo);display:inline-flex}.sumtoggle .cic svg{width:22px;height:22px;stroke:var(--amarelo);stroke-width:2;fill:none}
  .sumtoggle .val{margin-left:auto;font-weight:800;color:var(--escuro)}
  .sumtoggle .chev{width:16px;height:16px;stroke:var(--suave);stroke-width:2.4;fill:none;transition:transform .2s}
  .sumtoggle.open .chev{transform:rotate(180deg)}
  .sumbody{display:none;background:var(--card);border:1px solid var(--linha-2);border-top:none;border-radius:0 0 13px 13px;margin-top:-4px;padding:6px 16px 14px}
  .sumbody.open{display:block}
  .sum-item{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--linha)}
  .sum-item:last-of-type{border-bottom:none}
  .summary-img{width:42px;height:42px;border:1px solid var(--linha);border-radius:9px;background:#fff;display:grid;place-items:center;overflow:hidden;padding:4px;flex:0 0 auto}
  .summary-img img{max-width:100%;max-height:100%;object-fit:contain;mix-blend-mode:multiply}
  .sum-item .d{flex:1;min-width:0}.sum-item .d b{font-size:.84rem;font-weight:700;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sum-item .d span{font-size:.78rem;color:var(--suave);font-weight:600}
  .sum-item .pr{font-weight:800;font-size:.88rem;color:var(--escuro);white-space:nowrap}
  .row{display:flex;justify-content:space-between;margin-top:8px;font-size:.9rem;color:var(--suave);font-weight:600}
  .row.total{font-size:1.15rem;font-weight:800;color:var(--escuro);margin-top:12px;padding-top:12px;border-top:1px solid var(--linha)}
  .row .free{color:var(--verde-2);font-weight:800}

  /* WRAP / CARDS */
  .wrap{padding:16px 18px}
  .card{background:var(--card);border:1px solid var(--linha);border-radius:18px;padding:20px;box-shadow:var(--sombra-sm)}
  .card+.card{margin-top:14px}
  .card h2{font-size:1.2rem;color:var(--escuro);margin-bottom:4px}
  .card .sub{font-size:.9rem;color:var(--suave);font-weight:500;margin-bottom:14px}
  .center{text-align:center}
  .tick{width:44px;height:44px;border-radius:50%;background:#fff3e8;display:grid;place-items:center;margin:0 auto 10px}
  .tick svg{width:24px;height:24px;stroke:var(--amarelo);stroke-width:3;fill:none}

  .field{margin-bottom:13px}.field:last-child{margin-bottom:0}
  .field label{font-size:.82rem;font-weight:700;color:var(--texto);display:block;margin-bottom:5px}
  .field label .opt{color:var(--suave-2);font-weight:500}
  .field input,.field textarea,.field select{width:100%;min-width:0;padding:13px 14px;border:1.5px solid var(--linha-2);border-radius:12px;font-size:1rem;background:#fff;color:var(--texto);outline:none;font-weight:500;transition:border-color .15s,box-shadow .15s}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--amarelo);box-shadow:0 0 0 3px rgba(238,124,26,.22)}
  .field input.lock{background:var(--cream-2);color:var(--suave)}
  .field textarea{resize:none}
  .two{display:flex;gap:12px}.two .field{flex:1;min-width:0}
  .ferr{display:none;margin-top:6px;font-size:.78rem;font-weight:700;color:var(--vermelho)}
  .field input.inp-erro{border-color:var(--vermelho)!important;box-shadow:0 0 0 3px rgba(226,59,59,.16)}
  .cep-msg{display:block;margin-top:6px;font-size:.78rem;font-weight:700}
  .cep-msg.load{color:var(--suave)}.cep-msg.ok{color:var(--verde)}.cep-msg.err{color:var(--vermelho)}
  .divider{display:flex;align-items:center;justify-content:center;margin:6px 0 14px;position:relative}
  .divider::before{content:"";position:absolute;left:0;right:0;top:50%;height:1px;background:var(--linha)}
  .divider .pin{position:relative;background:var(--card);padding:0 10px}.divider .pin svg{width:20px;height:20px;stroke:var(--amarelo);stroke-width:2;fill:none}
  .chkline{display:flex;align-items:center;gap:9px;margin:2px 0 13px;font-size:.9rem;font-weight:600;color:var(--texto);cursor:pointer;user-select:none}
  .chkline input{width:18px;height:18px;flex:0 0 auto;accent-color:var(--amarelo);cursor:pointer}

  .btn-lg{width:100%;background:var(--amarelo);color:#fff;font-weight:800;font-size:1.04rem;padding:16px;border-radius:13px;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 8px 20px rgba(238,124,26,.28);margin-top:16px;transition:transform .12s}
  .btn-lg:active{transform:scale(.99)}
  .btn-lg svg{width:19px;height:19px}
  .btn-ghost{width:100%;background:var(--card);border:1.5px solid var(--linha-2);color:var(--escuro);font-weight:700;padding:13px;border-radius:12px;margin-top:10px}

  /* RECEIPT */
  .receipt{border:1.6px dashed #cfd4da;border-radius:12px;padding:18px 18px 16px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.82rem;color:#2a2f36;line-height:1.7}
  .receipt .rc-h{text-align:center}
  .receipt .rc-store{font-weight:800;font-size:1rem;letter-spacing:.04em}
  .receipt .rc-cnpj{font-size:.74rem;color:var(--suave)}
  .receipt hr{border:none;border-top:1px dashed #cfd4da;margin:11px 0}
  .receipt .rc-row{display:flex;justify-content:space-between;gap:10px}
  .receipt .rc-row.t{font-weight:800;font-size:.95rem;color:var(--escuro)}
  .receipt .rc-it{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
  .receipt .rc-it .nm{flex:1;min-width:0}
  .receipt .green{color:var(--verde-2);font-weight:700}
  .receipt .rc-thead{display:flex;justify-content:space-between;font-weight:800;color:var(--escuro)}

  /* COUPON */
  .coupon-lead{margin-top:16px;font-weight:700;color:var(--escuro);font-size:.95rem}
  .coupon-cond{font-size:.78rem;color:var(--suave-2);font-weight:600;margin:3px 0 9px}
  .coupon{display:flex;align-items:center;gap:11px;background:var(--cream-2);border:1px solid var(--linha-2);border-radius:12px;padding:13px 15px}
  .coupon .cz{display:inline-flex}.coupon .cz svg{width:20px;height:20px}
  .coupon b{font-weight:700;color:var(--escuro);font-size:.92rem}
  .coupon .quero{margin-left:auto;color:var(--amarelo);font-weight:800;font-size:.92rem}
  .coupon.ok{background:#eafaef;border-color:#bfe6cd}.coupon.ok .quero{color:var(--verde-2)}

  /* ADDRESS REVIEW + INFO */
  .addr-card .hd{display:flex;align-items:center;gap:8px;font-weight:800;color:var(--escuro)}
  .addr-card .hd svg{width:18px;height:18px;stroke:var(--amarelo);stroke-width:2;fill:none}
  .addr-card .edit{margin-left:auto;color:var(--amarelo);font-weight:800;font-size:.88rem}
  .addr-card p{margin-top:10px;font-size:.92rem;color:var(--texto);font-weight:600;line-height:1.5}
  .infobox h3{display:flex;align-items:center;gap:8px;font-size:1rem;color:var(--escuro);margin-bottom:10px}
  .infobox h3 svg{width:18px;height:18px;stroke:var(--amarelo);stroke-width:2;fill:none}
  .infobox{background:#fff8ef;border:1px solid #ffe2bd;border-radius:16px;padding:16px 18px}
  .infobox ul{margin:0;padding-left:4px;list-style:none}
  .infobox li{position:relative;padding-left:16px;font-size:.85rem;color:var(--suave);font-weight:500;line-height:1.5;margin-bottom:8px}
  .infobox li::before{content:"•";position:absolute;left:2px;color:var(--amarelo);font-weight:800}

  /* PAYMENT */
  .payopt{display:flex;align-items:center;gap:12px;border:1.5px solid var(--linha-2);border-radius:14px;padding:15px 16px;margin-top:11px;background:var(--card);transition:.12s}
  .payopt .pic{width:34px;flex:0 0 auto;display:grid;place-items:center}
  .payopt .pic svg{width:26px;height:26px}
  .payopt .pt{font-weight:800;color:var(--escuro);font-size:.98rem}
  .payopt .badge{margin-left:auto;background:#e7f6ee;color:var(--verde-2);font-size:.72rem;font-weight:800;padding:4px 9px;border-radius:999px;white-space:nowrap}
  .payopt.sel{border-color:var(--amarelo);background:#fff8ef;box-shadow:0 0 0 1.5px var(--amarelo)}
  .payopt.dis{opacity:.65;cursor:default}
  .payopt.dis .pic svg{stroke:var(--suave);stroke-width:1.8;fill:none}
  .payopt .meta{margin-left:auto;font-size:.76rem;color:var(--suave-2);font-weight:600;text-align:right;max-width:46%}
  .pix-body{border:1.5px solid var(--amarelo);border-top:none;border-radius:0 0 14px 14px;margin-top:-11px;padding:16px;background:#fff8ef}
  .pix-note{background:#fff;border:1px solid var(--linha-2);border-radius:11px;padding:11px 13px;font-size:.84rem;color:var(--suave);font-weight:500;line-height:1.5;margin-bottom:13px}
  .pix-val{color:var(--amarelo);font-weight:800;font-size:.98rem;margin:4px 0 12px}
  .pay-sec-title{font-size:.92rem;font-weight:800;color:var(--escuro);margin:20px 0 2px;display:flex;align-items:center;gap:8px}
  .pay-sec-title svg{width:18px;height:18px;stroke:var(--escuro);stroke-width:2;fill:none}

  /* GERANDO / STAGE */
  .stage{padding:18px}
  .gerando{text-align:center;padding:54px 22px}
  .gerando .pixwrap{width:96px;height:96px;border-radius:26px;background:#e7faf6;display:grid;place-items:center;margin:0 auto 22px;animation:pulse2 1.7s infinite}
  @keyframes pulse2{0%{box-shadow:0 0 0 0 rgba(50,188,173,.5)}70%{box-shadow:0 0 0 18px rgba(50,188,173,0)}100%{box-shadow:0 0 0 0 rgba(50,188,173,0)}}
  .gerando h1{font-size:1.4rem;color:var(--escuro)}
  .gerando p{color:var(--suave);margin-top:8px;font-weight:500}
  .spin{width:38px;height:38px;border:4px solid var(--linha-2);border-top-color:var(--pix);border-radius:50%;animation:spin .8s linear infinite;margin:22px auto 0}
  @keyframes spin{to{transform:rotate(360deg)}}
  .gsec{display:inline-flex;align-items:center;gap:7px;margin-top:22px;font-size:.82rem;color:var(--suave);font-weight:700;background:var(--cream-2);padding:8px 14px;border-radius:999px}
  .gsec svg{width:15px;height:15px;stroke:var(--verde);stroke-width:2.2;fill:none}

  .qr{width:212px;height:212px;margin:8px auto 6px;padding:12px;background:#fff;border:1px solid var(--linha-2);border-radius:16px;box-shadow:var(--sombra-sm)}
  .qr svg,.qr img{width:100%;height:100%;display:block;object-fit:contain}
  .stage h1{font-size:1.45rem;color:var(--escuro);text-align:center}
  .stage>p{color:var(--suave);margin-top:6px;font-weight:500;text-align:center}
  .pix-codebox{display:flex;align-items:center;gap:10px;background:var(--cream-2);border:1px solid var(--linha-2);border-radius:11px;padding:12px 14px;margin:14px auto 10px;max-width:420px;cursor:pointer;transition:border-color .12s,background .12s}
  .pix-codebox:active{background:#f3e9d9;border-color:var(--pix)}
  .pix-codebox code{flex:1;min-width:0;font-size:.76rem;color:var(--texto);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:ui-monospace,Menlo,monospace;text-align:left}
  .pix-codebox .cpic{flex:0 0 auto;display:inline-flex;color:var(--suave)}.pix-codebox .cpic svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none}
  .pix-copybtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;max-width:420px;margin:0 auto;background:var(--pix);color:#fff;font-weight:800;font-size:.95rem;padding:14px;border-radius:12px;box-shadow:0 6px 16px rgba(50,188,173,.3);transition:transform .12s}
  .pix-copybtn:active{transform:scale(.98)}
  .pix-copybtn svg{width:18px;height:18px;stroke:#fff;stroke-width:2.2;fill:none}
  .pix-copytip{font-size:.74rem;color:var(--suave-2);font-weight:600;text-align:center;margin-top:7px}
  .hint{font-size:.88rem;color:var(--suave);font-weight:500;line-height:1.5;margin-top:12px;text-align:center}
  .hint b{color:var(--escuro);font-weight:800}
  .pstatus{display:flex;width:max-content;max-width:100%;align-items:center;gap:9px;margin:16px auto 0;font-size:.92rem;font-weight:800;color:var(--verde-2);background:#e7f6ee;border:1px solid #bfe6d0;padding:10px 16px;border-radius:999px}
  .pulse-dot{width:10px;height:10px;border-radius:50%;background:var(--verde);flex:0 0 auto;animation:pulse 1.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(19,160,92,.5)}70%{box-shadow:0 0 0 9px rgba(19,160,92,0)}100%{box-shadow:0 0 0 0 rgba(19,160,92,0)}}
  .check{width:84px;height:84px;border-radius:50%;background:var(--verde);display:grid;place-items:center;margin:8px auto 16px;box-shadow:0 12px 30px rgba(19,160,92,.34)}
  .check svg{width:42px;height:42px;stroke:#fff;stroke-width:3;fill:none}
  .order-no{display:block;width:max-content;margin:16px auto 0;background:var(--cream-2);border:1px solid var(--linha-2);border-radius:10px;padding:9px 18px;font-weight:800;color:var(--escuro)}
  .resumo{text-align:left;background:var(--cream-2);border:1px solid var(--linha-2);border-radius:14px;padding:14px 16px;margin:18px auto 0;max-width:420px}
  .empty{padding:64px 20px;text-align:center;color:var(--suave)}
  .empty a{display:inline-block;margin-top:16px;background:var(--amarelo);color:#fff;font-weight:700;padding:13px 24px;border-radius:12px}

  /* FOOTER */
  .ck-footer{text-align:center;padding:24px 18px 30px;border-top:1px solid var(--linha);margin-top:8px}
  .ck-footer .fb{font-weight:800;color:var(--escuro)}
  .ck-footer .fc{font-size:.86rem;color:var(--suave);margin-top:3px}
  .ck-footer .fc a{color:var(--amarelo);font-weight:800}
  .ck-footer .seal{display:inline-flex;align-items:center;gap:7px;margin-top:14px;font-size:.82rem;font-weight:800;color:var(--suave)}
  .ck-footer .seal svg{width:15px;height:15px;stroke:var(--verde);stroke-width:2.2;fill:none}
  .ck-footer .cr{font-size:.74rem;color:var(--suave-2);margin-top:14px;border-top:1px solid var(--linha);padding-top:14px}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--escuro);color:#fff;font-size:.88rem;font-weight:600;padding:12px 20px;border-radius:13px;box-shadow:0 16px 40px rgba(0,0,0,.25);z-index:90;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="shell">
  <div class="appbar">
    <div class="row">
      <a class="logo" href="index.html" aria-label="Voltar à página inicial"><img src="assets/logo.jpg" alt="" onerror="this.style.display='none'">Zé na Porta</a>
      <a class="back" href="index.html"><svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg> Loja</a>
    </div>
  </div>
  <div class="ribbon">Sua bebida sempre gelada, com entrega super rápida! 🍻</div>
  <div id="wrap"></div>
  <div class="ck-footer">
    <div class="fb">Zé na Porta</div>
    <div class="fc">Dúvidas? Entre em contato pelos canais oficiais da operação.</div>
    <div class="seal"><svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>PAGAMENTO 100% SEGURO</div>
    <div class="cr">Zé na Porta © 2025/2026 · Todos os direitos reservados</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="produtos.js"></script>
<script>
const TAXA_ENTREGA=6.90, FRETE_GRATIS_ACIMA=30.00, NOME_LOJA="Zé na Porta", CNPJ="";
const DEMO_MODE = location.protocol==="file:" || ["localhost","127.0.0.1"].includes(location.hostname);
const API_BASE="/api";
const PRODUTOS=(window.DADOS&&window.DADOS.produtos)||[];
const PROD={}; PRODUTOS.forEach(p=>PROD[p.id]=p);
let carrinho;
try{ const h=decodeURIComponent((location.hash||"").replace(/^#/,"")); carrinho = h?JSON.parse(h):JSON.parse(localStorage.getItem("zg_cart")||"{}"); }
catch(e){ carrinho=JSON.parse(localStorage.getItem("zg_cart")||"{}"); }
localStorage.setItem("zg_cart", JSON.stringify(carrinho));

let step=1, sumOpen=false, desconto=0, txId=null, pixPoll=null;
let dados = JSON.parse(localStorage.getItem("zg_dados")||"{}");

const brl=v=>(Number(v)||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const esc=s=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");
const precoFinal=p=>(p.promo&&p.promo>0&&p.promo<p.preco)?p.promo:p.preco;
const itensIds=()=>Object.keys(carrinho);
const subtotal=()=>Object.entries(carrinho).reduce((s,[id,q])=>{const p=PROD[id];return s+(p?precoFinal(p)*q:0);},0);
const frete=()=>subtotal()>=FRETE_GRATIS_ACIMA?0:TAXA_ENTREGA;
const totalGeral=()=>Math.max(0, subtotal()+frete()-desconto);
const totalItens=()=>Object.values(carrinho).reduce((a,b)=>a+b,0);
let toastT; function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),1900);}
const v=id=>{const el=document.getElementById(id);return el?el.value.trim():"";};
function imgErr(el){el.onerror=null;el.style.display="none";}
function scrollTop(){ window.scrollTo({top:0,behavior:"smooth"}); }

/* ======= STEPS + SUMMARY ======= */
function stepsHTML(){
  const it=(n,lbl)=>{ let cls=""; if(step>n)cls="done"; else if(step===n)cls="on";
    const inner = step>n ? '<svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>' : n;
    return `<div class="st ${cls}"><span class="num">${inner}</span>${lbl}</div>`; };
  return `<div class="steps">${it(1,"Identificação")}<span class="bar"></span>${it(2,"Endereço")}<span class="bar"></span>${it(3,"Pagamento")}</div>`;
}
function sumbarHTML(){
  const items = itensIds().map(id=>{const p=PROD[id],q=carrinho[id];if(!p)return"";
    return `<div class="sum-item"><div class="summary-img"><img src="${esc(p.img)}" onerror="imgErr(this)"></div>
      <div class="d"><b>${esc(p.nome)}</b><span>${q}x · ${esc(p.vol||'')}</span></div>
      <div class="pr">${brl(precoFinal(p)*q)}</div></div>`;}).join("");
  return `<div class="sumbar">
    <button class="sumtoggle ${sumOpen?'open':''}" onclick="toggleSum()">
      <span class="cic"><svg viewBox="0 0 24 24"><path d="M5 7h14l-1.2 9.5a2 2 0 0 1-2 1.7H8.2a2 2 0 0 1-2-1.7L5 7Z"/><path d="M8.5 7a3.5 3.5 0 0 1 7 0"/></svg></span>
      ${sumOpen?'Ocultar':'Mostrar'} resumo do pedido <span class="val">${brl(totalGeral())}</span>
      <svg class="chev" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
    </button>
    <div class="sumbody ${sumOpen?'open':''}">
      ${items}
      <div class="row"><span>Subtotal</span><span>${brl(subtotal())}</span></div>
      <div class="row"><span>Entrega</span><span class="${frete()===0?'free':''}">${frete()===0?'GRÁTIS':brl(frete())}</span></div>
      ${desconto>0?`<div class="row"><span>Cupom</span><span class="free">- ${brl(desconto)}</span></div>`:""}
      <div class="row total"><span>Total</span><span>${brl(totalGeral())}</span></div>
    </div>
  </div>`;
}
function toggleSum(){ sumOpen=!sumOpen;
  document.querySelector(".sumtoggle").classList.toggle("open",sumOpen);
  document.querySelector(".sumbody").classList.toggle("open",sumOpen);
  document.querySelector(".sumtoggle").firstChild; // noop
  render(); }

/* ======= RENDER ======= */
function render(){
  const wrap=document.getElementById("wrap");
  if(!itensIds().length){
    wrap.innerHTML=`<div class="empty"><h1>Seu carrinho está vazio</h1><p style="margin-top:8px">Adicione bebidas para finalizar a compra.</p><a href="index.html">Voltar à loja</a></div>`;
    return;
  }
  let body="";
  if(step===1) body=viewIdentificacao();
  else if(step===2) body=viewRevisao();
  else body=viewPagamento();
  wrap.innerHTML = stepsHTML() + sumbarHTML() + `<div class="wrap">${body}</div>`;
}

/* ======= COLETA / VALIDAÇÃO ======= */
const FMAP={fNome:'nome',fTel:'tel',fCep:'cep',fRua:'rua',fNum:'num',fBairro:'bairro',fCidade:'cidade',fEstado:'estado',fObs:'obs',fCpf:'cpf'};
function coletar(){
  for(const id in FMAP){ const el=document.getElementById(id); if(el) dados[FMAP[id]]=el.value.trim(); }
  const sn=document.getElementById("fSemNum"); if(sn) dados.semnum=sn.checked;
  dados.end=enderecoLinhas().replace(/\n/g,", ");
  gerarEmail();
  localStorage.setItem("zg_dados",JSON.stringify(dados));
}
function gerarEmail(){
  const base=(dados.nome||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[^a-z0-9]/g,"");
  if(!base){ dados.email=""; return; }
  // mantém o mesmo e-mail enquanto o nome não mudar; regera se o nome mudou
  if(!dados.email || !dados.email.startsWith(base+"") || !/@gmail\.com$/.test(dados.email||"")){
    dados.email = base + Math.floor(10+Math.random()*90) + "@gmail.com";
  }
}
function maskCpf(s){ s=(s||"").replace(/\D/g,"").slice(0,11);
  if(s.length>9)return s.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/,"$1.$2.$3-$4");
  if(s.length>6)return s.replace(/(\d{3})(\d{3})(\d{1,3})/,"$1.$2.$3");
  if(s.length>3)return s.replace(/(\d{3})(\d{1,3})/,"$1.$2"); return s; }
function maskTel(s){ s=(s||"").replace(/\D/g,"").slice(0,11);
  if(s.length>10)return s.replace(/(\d{2})(\d{5})(\d{1,4})/,"($1) $2-$3");
  if(s.length>6)return s.replace(/(\d{2})(\d{4,5})(\d{1,4})/,"($1) $2-$3");
  if(s.length>2)return s.replace(/(\d{2})(\d{1,5})/,"($1) $2");
  if(s.length>0)return s.replace(/(\d{1,2})/,"($1"); return s; }
function cpfValido(cpf){ cpf=(cpf||"").replace(/\D/g,"");
  if(cpf.length!==11||/^(\d)\1{10}$/.test(cpf))return false;
  let s=0;for(let i=0;i<9;i++)s+=parseInt(cpf[i])*(10-i);
  let r=11-(s%11);if(r>=10)r=0;if(r!==parseInt(cpf[9]))return false;
  s=0;for(let i=0;i<10;i++)s+=parseInt(cpf[i])*(11-i);
  r=11-(s%11);if(r>=10)r=0;return r===parseInt(cpf[10]); }
function setErr2(id,msg){ const inp=document.getElementById(id); if(inp)inp.classList.toggle("inp-erro",!!msg);
  const e=document.getElementById("e_"+id); if(e){e.textContent=msg||"";e.style.display=msg?"block":"none";} }
function valNome(){ const ok=v("fNome").length>=2; setErr2("fNome",ok?"":"Informe seu nome completo"); return ok; }
function valTel(){ const d=v("fTel").replace(/\D/g,""); const ok=d.length>=10&&d.length<=11; setErr2("fTel",ok?"":"Telefone inválido — use DDD + número"); return ok; }
function valCpf(){ const ok=cpfValido(v("fCpf")); setErr2("fCpf",ok?"":"CPF inválido — confira os números"); return ok; }
function valEmail(){ const s=v("fEmail"); const ok=!s||/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s); setErr2("fEmail",ok?"":"E-mail inválido"); return ok; }
function valRua(){ const ok=v("fRua").length>1; setErr2("fRua",ok?"":"Informe a rua"); return ok; }
function valNum(){ const c=document.getElementById("fSemNum"); const ok=(c&&c.checked)||v("fNum").length>0; setErr2("fNum",ok?"":"Informe o número ou marque S/N"); return ok; }
function liveTel(){ const el=document.getElementById("fTel"); el.value=maskTel(el.value); const d=el.value.replace(/\D/g,""); if(d.length>=10)valTel(); else setErr2("fTel",""); }
function liveCpf(){ const el=document.getElementById("fCpf"); el.value=maskCpf(el.value); const d=el.value.replace(/\D/g,""); if(d.length===11)valCpf(); else setErr2("fCpf",""); }
function liveEmail(){ const s=v("fEmail"); if(s&&s.includes("@")&&s.includes("."))valEmail(); else setErr2("fEmail",""); }
function focarErro(id){ const el=document.getElementById(id); if(el){ el.scrollIntoView({behavior:"smooth",block:"center"}); setTimeout(()=>{try{el.focus({preventScroll:true});}catch(e){}},350);} }
function valStep1(){
  const checks=[["fNome",valNome],["fTel",valTel],["fRua",valRua],["fNum",valNum]];
  let first=null; checks.forEach(([id,fn])=>{ if(!fn()&&!first)first=id; });
  if(first){ focarErro(first); toast("Confira os campos destacados"); return false; }
  return true;
}
function cepInput(){ const el=document.getElementById("fCep"); let d=(el.value||"").replace(/\D/g,"").slice(0,8);
  el.value = d.length>5 ? d.slice(0,5)+"-"+d.slice(5) : d; if(d.length===8) buscarCep(d); }
function buscarCep(cep){ const msg=document.getElementById("cepMsg");
  if(msg){msg.textContent="buscando endereço…";msg.className="cep-msg load";}
  fetch("https://viacep.com.br/ws/"+cep+"/json/").then(r=>r.json()).then(dd=>{
    if(dd.erro){ if(msg){msg.textContent="CEP não encontrado";msg.className="cep-msg err";} return; }
    if(dd.logradouro)setVal("fRua",dd.logradouro);
    if(dd.bairro)setVal("fBairro",dd.bairro);
    if(dd.localidade)setVal("fCidade",dd.localidade);
    if(dd.uf)setVal("fEstado",dd.uf);
    if(msg){msg.textContent="endereço preenchido ✓";msg.className="cep-msg ok";}
    const n=document.getElementById("fNum"); if(n&&!n.disabled&&!n.value)n.focus();
  }).catch(()=>{ if(msg){msg.textContent="não foi possível buscar o CEP";msg.className="cep-msg err";} });
}
function setVal(id,val){ const el=document.getElementById(id); if(el)el.value=val; }
function toggleSemNum(){ const c=document.getElementById("fSemNum"),n=document.getElementById("fNum"); if(!n)return;
  if(c.checked){n.value="";n.disabled=true;n.placeholder="S/N";}else{n.disabled=false;n.placeholder="123";} }

/* ======= PAGAMENTO (PIX) ======= */
function clientePayload(){ return { name:dados.nome||"", email:dados.email||"", phone:(dados.tel||"").replace(/\D/g,""), document:{number:(dados.cpf||"").replace(/\D/g,""),type:"cpf"} }; }
function itensPayload(){ return itensIds().map(id=>{const p=PROD[id];return {title:"Marketplace de Vendas",unitPrice:p?precoFinal(p):0,quantity:carrinho[id],tangible:true};}); }
function telaGerando(){
  return `<div class="gerando">
    <div class="pixwrap">${logoPix(48)}</div>
    <h1>Gerando seu pedido</h1>
    <p>Estamos preparando sua cobrança Pix com segurança…</p>
    <div class="spin"></div>
    <div class="gsec"><svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>Pagamento 100% seguro · Pix</div>
  </div>`;
}
function pagarPix(){
  const total=totalGeral();
  document.getElementById("wrap").innerHTML=telaGerando(); scrollTop();
  if(DEMO_MODE){
    const code="00020126580014br.gov.bcb.pix0136ze-na-porta"+total.toFixed(2).replace('.','')+"5204000053039865802BR5911ZE NA PORTA6011PORTO VELHO62070503***6304";
    setTimeout(()=>{ telaPix(code,null); simularPagamentoDemo(); },2200); return;
  }
  fetch(API_BASE+"/pix-receive",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({amount:total,customer:clientePayload(),items:itensPayload()})})
    .then(r=>r.json()).then(ch=>{ if(ch.error||!ch.pix){ toast("Erro: "+(ch.error||'falha ao gerar Pix')); render(); return; }
      txId=ch.id; telaPix(ch.pix.qrCode,ch.pix.qrCodeUrl); iniciarPolling(); })
    .catch(()=>{ toast("Falha de conexão"); render(); });
}
function telaPix(code,url){
  const total=totalGeral();
  const qr = url?`<img src="${esc(url)}" alt="QR Code Pix" onerror="this.replaceWith(document.createRange().createContextualFragment('${qrSVG().replace(/'/g,"\\'")}'))">`:qrSVG();
  document.getElementById("wrap").innerHTML=`<div class="stage">
    <div style="display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:4px">${logoPix(26)}<h1 style="margin:0">Pague com Pix</h1></div>
    <p>Escaneie o QR Code no app do seu banco ou use o copia e cola.</p>
    <div class="qr">${qr}</div>
    <div class="pix-codebox" onclick="copyPix()" title="Toque para copiar"><code id="pixCode">${esc(code)}</code><span class="cpic"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg></span></div>
    <button class="pix-copybtn" id="pixCopyBtn" onclick="copyPix()"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>Copiar código Pix</button>
    <div class="pix-copytip">Toque no código ou no botão para copiar</div>
    <p class="hint">Valor: <b>${brl(total)}</b> · você tem <b>10 minutos</b> para pagar</p>
    <div class="pstatus" id="pstatus"><span class="pulse-dot"></span>Aguardando pagamento…</div>
    <p class="hint" style="margin-top:14px">A confirmação é <b>automática</b> assim que o pagamento for identificado. Pode deixar esta página aberta.</p>
  </div>`;
}
function iniciarPolling(){ pararPolling(); let t=0; pixPoll=setInterval(()=>{ t++; if(t>120){pararPolling();return;}
  fetch(API_BASE+"/pix-status?transaction_id="+encodeURIComponent(txId)).then(r=>r.json()).then(d=>{
    const st=d.transaction&&d.transaction.status;
    if(st==="paid")sucesso(); else if(["failed","expired","refunded"].includes(st)){pararPolling();toast("Pagamento "+st);}
  }).catch(()=>{}); },5000); }
function pararPolling(){ if(pixPoll){clearInterval(pixPoll);pixPoll=null;} }
function simularPagamentoDemo(){
  setTimeout(()=>{ const st=document.getElementById("pstatus"); if(st)st.innerHTML='<span class="pulse-dot"></span>Pagamento identificado, processando…';
    setTimeout(()=>{ const st2=document.getElementById("pstatus"); if(st2)st2.innerHTML='<span class="pulse-dot"></span>Pagamento aprovado!'; setTimeout(sucesso,900); },1800);
  },5000);
}
function sucesso(){
  pararPolling();
  const total=totalGeral(), itens=totalItens(), d=dados, numero=Math.floor(1000+Math.random()*9000);
  carrinho={}; localStorage.setItem("zg_cart","{}");
  document.getElementById("wrap").innerHTML=`<div class="stage">
    <div class="check"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></div>
    <h1>Pedido confirmado!</h1>
    <p>Pagamento aprovado com sucesso. Você vai receber as atualizações pelo telefone informado.</p>
    <span class="order-no">Pedido Nº ${numero}</span>
    <div class="resumo">
      <div class="row"><span>Itens</span><span>${itens} ${itens===1?'item':'itens'}</span></div>
      <div class="row"><span>Pagamento</span><span>Pix</span></div>
      <div class="row"><span>Entrega em</span><span>até 40 min</span></div>
      ${d.end?`<div class="row"><span>Endereço</span><span style="max-width:60%;text-align:right">${esc(d.end)}</span></div>`:""}
      <div class="row total"><span>Total pago</span><span>${brl(total)}</span></div>
    </div>
    <a class="btn-lg" style="max-width:360px;margin:20px auto 0;text-decoration:none" href="index.html">Voltar à loja</a>
  </div>`;
}
function qrSVG(){ const n=25,c=8; let seed=987654;
  const rnd=()=>{seed=(seed*1103515245+12345)&0x7fffffff;return (seed>>16)&1;};
  let s=`<svg viewBox="0 0 ${n*c} ${n*c}" shape-rendering="crispEdges"><rect width="${n*c}" height="${n*c}" fill="#fff"/>`;
  for(let y=0;y<n;y++)for(let x=0;x<n;x++){const f=(x<7&&y<7)||(x>=n-7&&y<7)||(x<7&&y>=n-7);if(!f&&rnd())s+=`<rect x="${x*c}" y="${y*c}" width="${c}" height="${c}" fill="#15171a"/>`;}
  const f=(ox,oy)=>{s+=`<rect x="${ox*c}" y="${oy*c}" width="${7*c}" height="${7*c}" fill="#15171a"/><rect x="${(ox+1)*c}" y="${(oy+1)*c}" width="${5*c}" height="${5*c}" fill="#fff"/><rect x="${(ox+2)*c}" y="${(oy+2)*c}" width="${3*c}" height="${3*c}" fill="#15171a"/>`;};
  f(0,0);f(n-7,0);f(0,n-7); return s+`</svg>`;
}
function copyPix(){
  const c=document.getElementById("pixCode"); const t=c?c.textContent.trim():"";
  if(!t) return;
  const ok=()=>{ toast("Código Pix copiado!"); flashCopiado(); };
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(t).then(ok).catch(()=>fallbackCopy(t,ok));
  } else { fallbackCopy(t,ok); }
}
function fallbackCopy(t,ok){
  try{
    const ta=document.createElement("textarea");
    ta.value=t; ta.setAttribute("readonly","");
    ta.style.position="fixed"; ta.style.top="0"; ta.style.left="0"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.focus(); ta.select(); ta.setSelectionRange(0,t.length);
    const done=document.execCommand("copy"); document.body.removeChild(ta);
    if(done) ok&&ok(); else toast("Selecione o código e copie manualmente");
  }catch(e){ toast("Selecione o código e copie manualmente"); }
}
function flashCopiado(){
  const b=document.getElementById("pixCopyBtn"); if(!b) return;
  if(b.dataset.busy) return; b.dataset.busy="1"; const html=b.innerHTML;
  b.innerHTML='<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#fff;stroke-width:2.6;fill:none"><path d="M20 6 9 17l-5-5"/></svg>Copiado!';
  b.style.background="var(--verde)";
  setTimeout(()=>{ b.innerHTML=html; b.style.background=""; delete b.dataset.busy; },1600);
}

render();
</script>
